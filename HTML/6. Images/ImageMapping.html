<!DOCTYPE html>
<html lang="en">    
    <head>
        <meta charset="UTF-8">
        <title>Image Mapping</title>
    </head>
    <body>
        <h1>Image Mapping</h1>
        <p>Image mapping when user rotates mouse then icon change, when user click it
            then Image redirect to another image.
        </p>
        <img src="file:///Users/kshitijhalder/Downloads/Aug.jpeg" height="200" width="175" alt="Aug" usemap="#Aug">
        <map name="Aug">
            <area shape="rect" coords="5,5,125,140" href="file:///Users/kshitijhalder/Downloads/City Skyline Space Needle Sunset.jpg"> 
            <area shape="circle" coords="150,50,30" href="file:///Users/kshitijhalder/Downloads/Aug.jpeg">
        </map>
        

    </body>
</html>
