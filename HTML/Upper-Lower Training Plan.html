<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>My Training Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --bg4: #222222;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #777;
    --faint: #333;
    --upper: #3b82f6;
    --lower: #22c55e;
    --push: #f97316;
    --pull: #a855f7;
    --legs: #14b8a6;
    --rest: #444;
    --red: #ef4444;
    --yellow: #eab308;
    --radius: 12px;
    --day-color: #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    padding-bottom: 100px;
  }

  /* ── HEADER ── */
  .app-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .app-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text);
  }
  .today-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--day-color);
    color: white;
  }

  /* ── DAY TABS ── */
  .day-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .day-tab.active {
    background: var(--day-color);
    border-color: var(--day-color);
    color: white;
  }
  .day-tab.rest-tab.active { background: var(--rest); border-color: var(--rest); }

  /* ── CONTENT AREA ── */
  .content { padding: 16px; }
  .day-view { display: none; }
  .day-view.active { display: block; }

  /* ── DAY HERO ── */
  .day-hero {
    border-radius: var(--radius);
    padding: 20px 18px 18px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    background: var(--bg3);
    border: 1px solid var(--border);
  }
  .day-hero::before {
    content: attr(data-label);
    position: absolute;
    right: -10px;
    top: -10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 90px;
    font-weight: 900;
    color: var(--day-color);
    opacity: 0.06;
    line-height: 1;
    letter-spacing: -2px;
    pointer-events: none;
  }
  .day-hero-day {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--day-color);
    margin-bottom: 4px;
  }
  .day-hero-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 900;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 8px;
  }
  .day-hero-sub {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 14px;
  }
  .stats-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .stat-pill span { color: var(--day-color); font-weight: 700; }

  /* ── INJURY BANNER ── */
  .injury-banner {
    background: #1a1200;
    border: 1px solid #4a3000;
    border-left: 3px solid var(--yellow);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 12.5px;
    line-height: 1.6;
    color: #d4b483;
  }
  .injury-banner strong { color: var(--yellow); display: block; margin-bottom: 2px; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }

  /* ── SECTIONS ── */
  .section {
    margin-bottom: 14px;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    background: var(--bg3);
    cursor: pointer;
    user-select: none;
  }
  .section-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .section-count {
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    margin-left: 6px;
    font-family: 'Barlow', sans-serif;
    text-transform: none;
    letter-spacing: 0;
  }
  .chevron {
    color: var(--muted);
    font-size: 16px;
    transition: transform 0.2s;
  }
  .section.collapsed .chevron { transform: rotate(-90deg); }
  .section-body { background: var(--bg2); }
  .section.collapsed .section-body { display: none; }

  /* ── WARMUP ITEMS ── */
  .warmup-item {
    display: flex;
    align-items: flex-start;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .warmup-item:last-child { border-bottom: none; }
  .warmup-num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--bg4);
    border: 1px solid var(--faint);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .warmup-info { flex: 1; }
  .warmup-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .warmup-meta { font-size: 12px; color: var(--muted); }
  .warmup-meta b { color: var(--day-color); }
  .vid-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    background: #1a0000;
    border: 1px solid #ff0000;
    color: #ff4444;
    font-size: 11px;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .vid-btn:active { background: #ff0000; color: white; }

  /* ── EXERCISE CARDS ── */
  .exercise-card {
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }
  .exercise-card:last-child { border-bottom: none; }
  .exercise-header {
    display: flex;
    align-items: center;
    padding: 14px;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }
  .ex-num {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: var(--day-color);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 900;
    color: white;
    flex-shrink: 0;
    opacity: 0.85;
  }
  .ex-info { flex: 1 }
  .ex-name {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 3px;
  }
  .ex-tags {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  .tag {
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .tag-sets { background: #1a2540; color: #60a5fa; }
  .tag-reps { background: #1a2a1a; color: #4ade80; }
  .tag-rest { background: #2a1a0a; color: #fb923c; }
  .ex-chevron { color: var(--muted); font-size: 14px; transition: transform 0.2s; }
  .exercise-card.open .ex-chevron { transform: rotate(180deg); }

  .exercise-body {
    display: none;
    padding: 0 14px 14px 58px;
  }
  .exercise-card.open .exercise-body { display: block; }

  .ex-muscles {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .ex-muscles b { color: var(--day-color); }

  .ex-cues { margin-bottom: 12px; }
  .cue {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 4px 0;
    font-size: 13px;
    line-height: 1.5;
    color: #ccc;
  }
  .cue::before {
    content: '→';
    color: var(--day-color);
    flex-shrink: 0;
    margin-top: 1px;
    font-size: 12px;
  }
  .cue.injury {
    color: #d4b483;
    background: #15110a;
    border-radius: 6px;
    padding: 6px 8px;
    margin-top: 4px;
    border-left: 2px solid var(--yellow);
  }
  .cue.injury::before { content: '🩹'; font-size: 11px; }

  /* ── VIDEO EMBED ── */
  .video-container {
    border-radius: 10px;
    overflow: hidden;
    background: #000;
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    margin-bottom: 4px;
  }
  .video-container iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }
  .video-placeholder {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #111;
    cursor: pointer;
    border-radius: 10px;
    border: 1px solid var(--border);
    gap: 8px;
  }
  .video-placeholder .play-icon {
    width: 52px;
    height: 52px;
    background: #ff0000;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }
  .video-placeholder .vid-label {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    padding: 0 16px;
    font-weight: 500;
  }
  .video-placeholder .vid-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    padding: 0 16px;
  }

  /* ── CARDIO SECTION ── */
  .cardio-block {
    padding: 14px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .cardio-icon {
    font-size: 28px;
    flex-shrink: 0;
  }
  .cardio-info {}
  .cardio-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
    color: var(--day-color);
  }
  .cardio-detail {
    font-size: 13px;
    color: #ccc;
    line-height: 1.6;
  }
  .hr-badge {
    display: inline-block;
    background: #1a0a0a;
    border: 1px solid var(--red);
    color: #ff6b6b;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 6px;
  }

  /* ── CHECKLIST ── */
  .checklist { padding: 8px 14px 14px; }
  .check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .check-item:last-child { border-bottom: none; }
  .check-box {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 2px solid var(--faint);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 12px;
  }
  .check-item.done .check-box {
    background: var(--day-color);
    border-color: var(--day-color);
    color: white;
  }
  .check-label {
    font-size: 13px;
    color: #ccc;
    transition: color 0.15s;
  }
  .check-item.done .check-label {
    color: var(--muted);
    text-decoration: line-through;
  }

  /* ── REST DAY ── */
  .rest-hero {
    text-align: center;
    padding: 48px 24px;
  }
  .rest-emoji { font-size: 64px; margin-bottom: 16px; }
  .rest-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px;
    font-weight: 900;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .rest-sub { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
  .rest-tips { text-align: left; }
  .rest-tip {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: #ccc;
    line-height: 1.5;
  }
  .rest-tip:last-child { border-bottom: none; }
  .tip-icon { font-size: 18px; flex-shrink: 0; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 4px max(env(safe-area-inset-bottom), 8px);
    z-index: 200;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 6px 4px;
    cursor: pointer;
    border-radius: 10px;
    transition: background 0.15s;
    border: none;
    background: transparent;
    -webkit-appearance: none;
  }
  .nav-item:active { background: var(--bg3); }
  .nav-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    margin-bottom: 2px;
    transition: all 0.15s;
  }
  .nav-item.active .nav-dot {
    background: var(--day-color);
    width: 24px;
    border-radius: 3px;
  }
  .nav-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    transition: color 0.15s;
  }
  .nav-item.active .nav-label { color: var(--day-color); }

  /* ── PROGRESS BAR ── */
  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--day-color);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <div class="app-title">⚡ My Training</div>
    <div class="today-badge" id="todayBadge">Today</div>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
</div>

<div class="content" id="mainContent"></div>

<nav class="bottom-nav" id="bottomNav"></nav>

// ── State ──
let activeDay = 0;
let checkStates = JSON.parse(localStorage.getItem('checkStates') || '{}');

// ── Day of week detection ──
function getTodayIndex() {
  const dow = new Date().getDay(); // 0=Sun, 1=Mon ... 6=Sat
  const map = { 1: 0, 2: 1, 3: 2, 4: 3, 5: 4, 6: 5, 0: 6 };
  return map[dow];
}

// ── Color CSS var per day ──
function setDayColor(color) {
  document.documentElement.style.setProperty('--day-color', color);
}

// ── Render tabs ──
function renderTabs() {
  const container = document.getElementById('dayTabs');
  container.innerHTML = DAYS_DATA.map((d, i) => `
    <button class="day-tab ${d.isRest ? 'rest-tab' : ''} ${i === activeDay ? 'active' : ''}" onclick="switchDay(${i})">
      ${d.emoji} ${d.dayName}
    </button>
  `).join('');
}

// ── Render bottom nav ──
function renderBottomNav() {
  const nav = document.getElementById('bottomNav');
  const workoutDays = DAYS_DATA.filter(d => !d.isRest);
  const items = DAYS_DATA.map((d, i) => `
    <button class="nav-item ${i === activeDay ? 'active' : ''}" onclick="switchDay(${i})">
      <div class="nav-dot"></div>
      <div class="nav-label">${d.dayName.slice(0,3)}</div>
    </button>
  `).join('');
  nav.innerHTML = items;
}

// ── Build exercise card ──
function buildExercise(ex, idx, dayId) {
  const checkKey = `${dayId}-ex-${idx}`;
  const done = checkStates[checkKey];
  return `
  <div class="exercise-card ${done ? 'done' : ''}" id="exc-${dayId}-${idx}">
    <div class="exercise-header" onclick="toggleExercise('${dayId}', ${idx})">
      <div class="ex-num">${idx + 1}</div>
      <div class="ex-info">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-tags">
          <span class="tag tag-sets">${ex.sets} sets</span>
          <span class="tag tag-reps">${ex.reps} reps</span>
          <span class="tag tag-rest">Rest ${ex.rest}</span>
        </div>
      </div>
      <div class="ex-chevron">▼</div>
    </div>
    <div class="exercise-body">
      <div class="ex-muscles">💪 <b>Muscles:</b> ${ex.muscles}</div>
      <div class="ex-cues">
        ${ex.cues.map(c => `<div class="cue">${c}</div>`).join('')}
        ${ex.injury ? `<div class="cue injury">${ex.injury}</div>` : ''}
      </div>
      <div class="video-container" id="vid-${dayId}-${idx}">
        <div class="video-placeholder" onclick="loadVideo('${dayId}', ${idx}, '${ex.ytEmbed}', '${encodeURIComponent(ex.name)}')">
          <div class="play-icon">▶</div>
          <div class="vid-title">${ex.name}</div>
          <div class="vid-label">Tap to load tutorial video</div>
        </div>
      </div>
    </div>
  </div>`;
}

  return `
  <div class="warmup-item">
    <div class="warmup-num">${idx + 1}</div>
    <div class="warmup-info">
      <div class="warmup-name">${item.name}</div>
      <div class="warmup-meta"><b>${item.duration}</b> · ${item.purpose}</div>
      <a href="${item.yt}" target="_blank" class="vid-btn">▶ Watch Tutorial</a>
    </div>
  </div>`;
}

// ── Build checklist ──
function buildChecklist(items, dayId) {
  return items.map((item, i) => {
    const key = `${dayId}-check-${i}`;
    const done = checkStates[key];
    return `
    <div class="check-item ${done ? 'done' : ''}" onclick="toggleCheck('${key}', this)">
      <div class="check-box">${done ? '✓' : ''}</div>
      <div class="check-label">${item}</div>
    </div>`;
  }).join('');
}

// ── Build full day view ──
function buildDayView(day, i) {
  if (day.isRest) {
    return `
    <div class="day-view" id="day-${i}">
      <div class="rest-hero">
        <div class="rest-emoji">${day.emoji}</div>
        <div class="rest-title">${day.title}</div>
        <div class="rest-sub">${day.dayName} — ${day.subtitle}<br>This is when your body actually grows. Protect it.</div>
        <div class="rest-tips">
          ${day.restTips.map(t => `
            <div class="rest-tip">
              <span class="tip-icon">${t.icon}</span>
              <span>${t.text}</span>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
  }

  const completedChecks = day.checklist.filter((_, ci) => checkStates[`${day.id}-check-${ci}`]).length;
  const progress = Math.round((completedChecks / day.checklist.length) * 100);

  return `
  <div class="day-view" id="day-${i}">
    <div class="day-hero" data-label="${day.title.split(' ')[0].toUpperCase()}">
      <div class="day-hero-day">${day.label} · ${day.dayName}</div>
      <div class="day-hero-title">${day.title}</div>
      <div class="day-hero-sub">${day.subtitle}</div>
      <div class="stats-row">
        <div class="stat-pill">⏱ <span>${day.duration}</span></div>
        <div class="stat-pill">🚴 <span>${day.cardio}</span></div>
        <div class="stat-pill">✅ <span>${completedChecks}/${day.checklist.length}</span> done</div>
      </div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" style="width: ${progress}%"></div>
    </div>

    <div class="injury-banner">
      <strong>⚠ Injury Note</strong>
      ${day.injury}
    </div>

    <div class="section" id="sec-warmup-${i}">
      <div class="section-header" onclick="toggleSection('sec-warmup-${i}')">
        <div class="section-header-left">
          <div class="section-icon" style="background:#0d3d38">🔥</div>
          <div class="section-title">Warm-Up <span class="section-count">${day.warmup.length} exercises · 10 mins</span></div>
        </div>
        <div class="chevron">▾</div>
      </div>
      <div class="section-body">
        ${day.warmup.map((w, wi) => buildWarmup(w, wi)).join('')}
      </div>
    </div>

    <div class="section" id="sec-main-${i}">
      <div class="section-header" onclick="toggleSection('sec-main-${i}')">
        <div class="section-header-left">
          <div class="section-icon" style="background:#1a1040">💪</div>
          <div class="section-title">Main Workout <span class="section-count">${day.exercises.length} exercises · 40 mins</span></div>
        </div>
        <div class="chevron">▾</div>
      </div>
      <div class="section-body">
        ${day.exercises.map((ex, ei) => buildExercise(ex, ei, day.id)).join('')}
      </div>
    </div>

    <div class="section" id="sec-cardio-${i}">
      <div class="section-header" onclick="toggleSection('sec-cardio-${i}')">
        <div class="section-header-left">
          <div class="section-icon" style="background:#1a0a1a">🚴</div>
          <div class="section-title">Cardio Finisher <span class="section-count">10 mins</span></div>
        </div>
        <div class="chevron">▾</div>
      </div>
      <div class="section-body">
        <div class="cardio-block">
          <div class="cardio-icon">🚴</div>
          <div class="cardio-info">
            <div class="cardio-title">Stationary Bike</div>
            <div class="cardio-detail">${day.cardioDetail}</div>
            <div class="hr-badge">❤️ Target: 117–137 bpm</div>
          </div>
        </div>
      </div>
    </div>

    <div class="section" id="sec-check-${i}">
      <div class="section-header" onclick="toggleSection('sec-check-${i}')">
        <div class="section-header-left">
          <div class="section-icon" style="background:#0f2010">✅</div>
          <div class="section-title">Session Checklist <span class="section-count">${completedChecks}/${day.checklist.length} done</span></div>
        </div>
        <div class="chevron">▾</div>
      </div>
      <div class="section-body">
        <div class="checklist" id="checklist-${i}">
          ${buildChecklist(day.checklist, day.id)}
        </div>
      </div>
    </div>
  </div>`;
}

// ── Interactions ──
function switchDay(i) {
  activeDay = i;
  const day = DAYS_DATA[i];
  setDayColor(day.color);

  document.querySelectorAll('.day-view').forEach(v => v.classList.remove('active'));
  document.getElementById(`day-${i}`).classList.add('active');

  document.querySelectorAll('.day-tab').forEach((t, ti) => t.classList.toggle('active', ti === i));
  document.querySelectorAll('.nav-item').forEach((n, ni) => n.classList.toggle('active', ni === i));

  const badge = document.getElementById('todayBadge');
  badge.textContent = i === getTodayIndex() ? '● Today' : day.dayName;
  badge.style.background = day.color;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleSection(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

function toggleExercise(dayId, idx) {
  const card = document.getElementById(`exc-${dayId}-${idx}`);
  card.classList.toggle('open');
}

function loadVideo(dayId, idx, ytId, title) {
  const container = document.getElementById(`vid-${dayId}-${idx}`);
  const decodedTitle = decodeURIComponent(title);
  if (ytId && ytId !== 'undefined') {
    container.innerHTML = `<iframe src="https://www.youtube.com/embed/${ytId}?rel=0&modestbranding=1" allowfullscreen allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"></iframe>`;
  } else {
    window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(decodedTitle + ' how to form tutorial')}`, '_blank');
  }
}

function toggleCheck(key, el) {
  const isDone = !checkStates[key];
  checkStates[key] = isDone;
  localStorage.setItem('checkStates', JSON.stringify(checkStates));
  el.classList.toggle('done', isDone);
  el.querySelector('.check-box').textContent = isDone ? '✓' : '';
  // Update progress bar
  updateProgress();
}

function updateProgress() {
  const day = DAYS_DATA[activeDay];
  if (day.isRest) return;
  const completed = day.checklist.filter((_, ci) => checkStates[`${day.id}-check-${ci}`]).length;
  const pct = Math.round((completed / day.checklist.length) * 100);
  const bar = document.querySelector('.progress-bar-fill');
  if (bar) bar.style.width = pct + '%';
  // Update stat pill
  const pills = document.querySelectorAll('.stat-pill');
  pills.forEach(p => { if (p.textContent.includes('done')) p.querySelector('span').textContent = `${completed}/${day.checklist.length}`; });
}

// ── Init ──
function init() {
  const content = document.getElementById('mainContent');
  content.innerHTML = DAYS_DATA.map((d, i) => buildDayView(d, i)).join('');
  renderTabs();
  renderBottomNav();

  const todayIdx = getTodayIndex();
  switchDay(todayIdx);
}

init();
</script>
</body>
</html>
