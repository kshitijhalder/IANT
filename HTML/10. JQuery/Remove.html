<!DOCTYPE html>
<html lang="en">

    <head>
        <title>  Removing Elements  </title>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script>
            $(document).ready(function(){
                $("#btn1").click(function(){
                    $("#div1").remove();
                });
                $("#btn2").ready(function(){
                    $("#btn2").click(function(){
                        $("#div2").empty();
                    });
                });
            });
        </script>
    </head>

    <body>
        <h1> Removing Elements </h1>
        <div id="div1" style="height: 100px; width: 300px; border: 2px solid black; background-color: lightblue;">
            Computer Programming Languages
            <p> Java, C++ and PHP are some of the most popular languages in the world. </p>
        </div><br>
        <h1> Emptying Elements </h1>
        <div id="div2" style="height: 100px; width: 300px; border: 2px solid black; background-color: lightblue;">
            Computer Programming Languages 
            <p> Java, C++ and PHP are some of the most popular languages in the world. </p>
        </div><br>
        <button id="btn1"> Remove Div 1 </button>
        <button id="btn2"> Empty Div 2 </button>
    </body>
</html>
