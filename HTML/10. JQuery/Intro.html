<!DOCTYPE html>
<html lang="en">

    <head>
        <title> JQuery </title>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script> 
            $(document).ready(function(){
                //alert("Welcome to IANT");
                $("p").dblclick(function(){
                    $(this).hide();
                });
            });

        </script>
    </head>
    <body>
        <h1> JQuery </h1>
        <p> This is a simple example of JQuery 
        (Click on this paragraph to hide it)
        </p>
    </body>
</html>
