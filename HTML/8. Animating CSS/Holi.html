<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Holi Animation</title>
        <style>
            body {
                margin: 0;
                height: 100vh;
                background: radial-gradient(circle, #fff176, #ffcc80, #f48fb1);
                overflow: hidden;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            /* Holi Text */
            h1 {
                position: absolute;
                font-size: 60px;
                font-family: cursive;
                color: #fff;
                text-shadow: 2px 2px 10px #000;
                z-index:10;
            }

            /* Color Splash */
            .color {
                position: absolute;
                width: 30px;
                height: 30px;
                border-radius: 50%;
                opacity: 0.8;
                animation: splash 3s infinite;
            }

            .c1 { background: #ff1744; left: 20%; animation-delay: 0s; }
            .c2 { background: #ffea00; left: 40%; animation-delay: 0.5s; }
            .c3 { background: #00e676; left: 60%; animation-delay: 1s; }
            .c4 { background: #2979ff; left: 80%; animation-delay: 1.5s; }
            .c5 { background: #d500f9; left: 50%; animation-delay: 2s; }
            .h { background: linear-gradient(360deg,red,blue,green,yellow,purple); 
                -webkit-background-clip: text; 
                -webkit-text-fill-color: red; 
                color: transparent; 
                animation: color;
            }

            @keyframes splash {
                0% {
                    bottom: -20px;
                    transform: scale(0);
                }
                50% {
                    transform: scale(2);
                    opacity: 1;
                }
                100% {
                    bottom: 110%;
                    transform: scale(0);
                    opacity: 0;
                }
            }
        </style>
    </head>
    <body>
        <h1>Happy Holi!</h1>
        <div class="color c1"></div>
        <div class="color c2"></div>
        <div class="color c3"></div>
        <div class="color c4"></div>
        <div class="color c5"></div>
    </body>
</html>
