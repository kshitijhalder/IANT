<!DOCTYPE html>
<html>
    <head>
        <title>CSS Animation</title>
        <style>
            body {
                height: 100vh;
                margin: 0;
                background-color: black;
                position: relative;
                overflow: hidden;
            }
            .square {
                width: 80px;
                height: 80px;
                background-color: red;
                position: absolute;
                top: 200px;
                left: 50px;
                animation: moveRotate 4s linear infinite;
            }

            .circle {
                width: 80px;
                height: 80px;
                background-color: blue;
                border-radius: 50%;
                position: absolute;
                top: 0;
                left: 300px;
                animation: moveDown 4s ease-in-out infinite;
            }

            @keyframes moveRotate {
                 0% {
                    left: 0;
                    transform: rotate(0deg);
                 }
                 100% {
                    left: 1000px;
                    transform: rotate(360deg);
                 }
            }

            @keyframes moveDown {
                 0% {
                    top: 0;
                 }
                 100% {
                    top: 1000px;
                }
            }

            @keyframes moveUp {
                0% {
                    top: 1000px;
                }
                100% {
                    top: 0;
                }
            }
        </style>
    </head>

    <body>
        <div class="square"></div>
        <div class="circle"></div>
    </body>
</html>
