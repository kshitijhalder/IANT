<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Flexible Images</title>
        <style>
            .container {
                display: flex;
                gap: 20px;
                align-items: center;
            }

            .container img {
                max-width: 100%;
                height: auto;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <img src="/Users/kshitijhalder/Downloads/CSS Icon.png" width="450" height="300">
        </div>
        <p> Resize the browser window to see how the image scales with the window size. </p>
    </body>
</html>
