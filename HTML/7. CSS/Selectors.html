<!DOCTYPE html>
<html>
    <head>
        <title>CSS Selectors</title>
        <style>
            *{
                font-family: Arial, sans-serif;    
            }
            p{
                color: red;
                text-align: center;
            }
            h3.left{
                color: blue;
                text-align: top left;
            }
            #para{
                color: green;
                font-size: 20px;
            }
            ul>li{
                color: yellow;
            }
            ul, li{
                background-color: black;
            }
        </style>
    </head>
    <body>
        <p>Hello Learners!!</p>
        <h3 class="left">Welcome to page</h3>
        <h2 id="para">Type of selectors</h2>

        <ul>
            <li>Child Selector</li>
            <li>ID Selector</li>
            <li>Universal Selector</li>
            <li>Descendant Selector</li>
            <li>Class Selector</li>
            <li>Grouping Selector</li>
    </body>
</html>
